services:
  py-captions:
    image: ghcr.io/jay3702/py-captions-for-channels:latest
    container_name: py-captions-for-channels
    restart: unless-stopped
    runtime: ${DOCKER_RUNTIME:-runc}
    
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-}
      # GPU: set DOCKER_RUNTIME=nvidia and NVIDIA_VISIBLE_DEVICES=all in .env
      # Set container timezone (recommended for local timestamp display)
      - TZ=${TZ:-}
      # Explicit server timezone used by app for formatting
      - SERVER_TZ=${SERVER_TZ:-}
      - DISCOVERY_MODE=${DISCOVERY_MODE:-polling}
      - WEBHOOK_HOST=${WEBHOOK_HOST:-0.0.0.0}
      - WEBHOOK_PORT=${WEBHOOK_PORT:-9000}
      - WEB_UI_PORT=${WEB_UI_PORT:-8000}
      - CHANNELS_DVR_URL=${CHANNELS_DVR_URL:-http://localhost:8089}
      - CHANNELS_API_URL=${CHANNELS_API_URL:-}
      - CHANNELWATCH_URL=${CHANNELWATCH_URL:-}
      - API_TIMEOUT=${API_TIMEOUT:-10}
      # Path prefix mapping (distributed deployments only)
      - DVR_PATH_PREFIX=${DVR_PATH_PREFIX:-}
      - LOCAL_PATH_PREFIX=${LOCAL_PATH_PREFIX:-}
      - DVR_RECORDINGS_PATH=${DVR_RECORDINGS_PATH:-/recordings}
      # Windows drive-letter mount path (used for actionable startup log messages)
      - DVR_MEDIA_HOST_PATH=${DVR_MEDIA_HOST_PATH:-}
      - DVR_MEDIA_MOUNT=${DVR_MEDIA_MOUNT:-/mnt/media}
      
      # Caption processing options
      - TRANSCODE_FOR_FIRETV=${TRANSCODE_FOR_FIRETV:-false}
      - KEEP_ORIGINAL=${KEEP_ORIGINAL:-true}
      - CAPTION_COMMAND=${CAPTION_COMMAND:-}
      
      # Data storage — all persistent data lives under DATA_DIR inside the
      # container (/app/data by default).  The volume mount below controls
      # where that maps on the host.  Individual paths can still be overridden.
      - DATA_DIR=${DATA_DIR:-/app/data}
      # Override quarantine dir to live on the same mount as recordings,
      # so os.rename() works (instant) instead of cross-device copy.
      - QUARANTINE_DIR=${QUARANTINE_DIR:-}
      - DRY_RUN=${DRY_RUN:-false}
      - PIPELINE_TIMEOUT=${PIPELINE_TIMEOUT:-7200}
      - STALE_EXECUTION_SECONDS=${STALE_EXECUTION_SECONDS:-7200}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_VERBOSITY=${LOG_VERBOSITY:-NORMAL}
      
      # Experimental features
      - CHANNELS_FILES_ENABLED=${CHANNELS_FILES_ENABLED:-false}

    volumes:
      # Host data directory → container /app/data
      # Change the left side to point to a volume with ample disk space.
      # Example: /mnt/data/py-captions:/app/data
      - ${HOST_DATA_DIR:-./data}:/app/data
      - ./.env:/app/.env
      # Mount one level above Channels so quarantine dir can sit alongside
      # it on the same filesystem (enables instant os.rename moves).
      # DVR_MEDIA_HOST_PATH: set this on Windows to bypass the CIFS named volume driver.
      #   Docker Desktop handles the path natively as a bind mount — no driver_opts needed.
      #   Use a mapped drive letter (recommended): DVR_MEDIA_HOST_PATH=Z:/
      #   Or a UNC path (requires creds in Windows Credential Manager): DVR_MEDIA_HOST_PATH=//192.168.3.150/Channels
      #   Use forward slashes. When unset, falls back to the named volume below (Linux default).
      # Set DVR_MEDIA_MOUNT to the container path (also set LOCAL_PATH_PREFIX to match).
      - ${DVR_MEDIA_HOST_PATH:-channels_media}:${DVR_MEDIA_MOUNT:-/mnt/media}
      # WSL2 NVENC: bind-mount the WSL NVIDIA libs so ffmpeg can use NVENC.
      # libnvidia-encode.so.1 lives at /usr/lib/wsl/lib on the WSL host but is
      # NOT automatically exposed by the nvidia container runtime.
      # WSL2: set WSL_LIB_PATH=/usr/lib/wsl/lib in .env (setup wizard does this).
      # Native Linux / non-WSL: set WSL_LIB_PATH=/tmp (or leave unset — /tmp is
      # the default, a harmless empty mount that doesn't affect anything).
      - ${WSL_LIB_PATH:-/tmp}:/usr/lib/wsl/lib:ro
    ports:
      - "${WEBHOOK_PORT:-9000}:${WEBHOOK_PORT:-9000}"
      - "${WEB_UI_PORT:-8000}:${WEB_UI_PORT:-8000}"
      - "61208:61208"  # Glances web UI (legacy, may be removed)
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  # DVR media volume — configurable via .env for local bind mounts or SMB/CIFS.
  #
  # Linux bind mount (default, e.g. niu — DVR and captions on same host):
  #   DVR_MEDIA_TYPE=none
  #   DVR_MEDIA_DEVICE=/tank/AllMedia/Channels   ← or set DVR_MEDIA_MOUNT and omit this
  #   DVR_MEDIA_OPTS=bind
  #   DVR_MEDIA_MOUNT=/tank/AllMedia/Channels
  #
  # Windows host accessing SMB share (e.g. borgpad) — use DVR_MEDIA_HOST_PATH instead of CIFS driver:
  #   1. Map the share in Windows:  net use Z: \\192.168.3.150\Channels /user:USERNAME PASSWORD /persistent:yes
  #   2. Set in .env:
  #      DVR_MEDIA_HOST_PATH=Z:/                          ← mapped drive letter (simplest)
  #      DVR_MEDIA_MOUNT=/mnt/channels
  #      LOCAL_PATH_PREFIX=/mnt/channels
  #      DVR_PATH_PREFIX=/tank/AllMedia/Channels
  #   Alternatively, if creds are in Windows Credential Manager, UNC paths also work:
  #      DVR_MEDIA_HOST_PATH=//192.168.3.150/Channels
  channels_media:
    driver: local
    driver_opts:
      type: ${DVR_MEDIA_TYPE:-none}
      device: ${DVR_MEDIA_DEVICE:-${DVR_MEDIA_MOUNT:-/mnt/media}}
      o: ${DVR_MEDIA_OPTS:-bind}