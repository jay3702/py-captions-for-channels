# Development / local-build override.
#
# Adds `build: .` so the image is built locally, and bind-mounts the Python
# source so code changes take effect on container restart without rebuilding.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build -d
#
# Useful for development or when modifying the Dockerfile.

services:
  py-captions:
    build: .
    volumes:
      - ./py_captions_for_channels:/app/py_captions_for_channels
