# CPU-only override — DEPRECATED.
# As of 2026-03, the base docker-compose.yml defaults to CPU-safe settings.
# GPU users add DOCKER_RUNTIME=nvidia and NVIDIA_VISIBLE_DEVICES=all to .env.
# This file is kept for backward compatibility but is no longer needed.
#
# Old usage:
#   docker compose -f docker-compose.yml -f docker-compose.cpu.yml up -d

services:
  py-captions:
    runtime: runc
    environment:
      - NVIDIA_VISIBLE_DEVICES=
